<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>For You 💗</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --maroon: #6b0f2b;
        --rose: #c4184b;
        --pink: #ff7aa2;
        --blush: #ffd8e4;
        --cream: #fff6f8;
        --gold: #f2b15c;
      }
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--cream);
        font-family: "Poppins", sans-serif;
        color: var(--maroon);
        overflow-x: hidden;
        position: relative;
        min-height: 100vh;
      }

      /* ---------- Tiled repeating background text ---------- */
      #bgTextLayer {
        position: fixed;
        inset: -25% -10%;
        transform: rotate(-9deg);
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
        opacity: 0.19;
      }
      .bg-row {
        white-space: nowrap;
        font-family: "Dancing Script", cursive;
        font-weight: 700;
        color: var(--rose);
        line-height: 1.4;
        will-change: transform;
      }

      /* ---------- Floating ambient hearts ---------- */
      #heartLayer {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        overflow: hidden;
      }
      .float-heart {
        position: absolute;
        bottom: -40px;
        font-size: 18px;
        opacity: 0.85;
        animation: floatUp linear forwards;
        filter: drop-shadow(0 2px 4px rgba(196, 24, 75, 0.25));
      }
      @keyframes floatUp {
        0% {
          transform: translateY(0) translateX(0) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 0.9;
        }
        100% {
          transform: translateY(-110vh) translateX(var(--drift, 20px))
            rotate(360deg);
          opacity: 0;
        }
      }

      /* ---------- Heartbeat scroll progress (signature element) ---------- */
      #heartbeatWrap {
        position: fixed;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        height: 70vh;
        width: 34px;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #heartbeatWrap svg {
        height: 100%;
        width: 100%;
        overflow: visible;
      }
      #hbTrack {
        fill: none;
        stroke: var(--blush);
        stroke-width: 3;
        stroke-linecap: round;
      }
      #hbFill {
        fill: none;
        stroke: var(--rose);
        stroke-width: 3.5;
        stroke-linecap: round;
        stroke-dasharray: 2000;
        stroke-dashoffset: 2000;
        filter: drop-shadow(0 0 4px rgba(196, 24, 75, 0.6));
        transition: stroke-dashoffset 0.12s linear;
      }
      #hbHeart {
        position: absolute;
        font-size: 16px;
        transform: translate(-50%, -50%);
        filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.9));
      }

      /* ---------- Layout wrapper ---------- */
      .page {
        position: relative;
        z-index: 1;
        max-width: 480px;
        margin: 0 auto;
        padding: 0 18px 80px;
      }

      /* ---------- Hero ---------- */
      .hero {
        padding: 60px 6px 34px;
        text-align: center;
        position: relative;
      }
      .hero-heart {
        font-size: 52px;
        animation: pulseBeat 1.4s ease-in-out infinite;
        display: inline-block;
        filter: drop-shadow(0 6px 14px rgba(196, 24, 75, 0.35));
      }
      @keyframes pulseBeat {
        0%,
        100% {
          transform: scale(1);
        }
        25% {
          transform: scale(1.18);
        }
        40% {
          transform: scale(0.95);
        }
        55% {
          transform: scale(1.1);
        }
      }
      .hero h1 {
        font-family: "Dancing Script", cursive;
        font-size: clamp(38px, 11vw, 58px);
        color: var(--rose);
        margin: 10px 0 6px;
        text-shadow: 0 3px 0 rgba(255, 255, 255, 0.6);
      }
      .hero p.msg {
        font-size: 15px;
        color: var(--maroon);
        opacity: 0.8;
        max-width: 340px;
        margin: 0 auto;
        line-height: 1.6;
      }
      .hero .ribbon {
        display: inline-block;
        margin-top: 18px;
        padding: 8px 22px;
        background: linear-gradient(135deg, var(--rose), var(--pink));
        color: #fff;
        border-radius: 999px;
        font-size: 13px;
        letter-spacing: 0.5px;
        box-shadow: 0 8px 20px rgba(196, 24, 75, 0.35);
      }
      .scroll-hint {
        margin-top: 28px;
        font-size: 12px;
        color: var(--rose);
        opacity: 0.7;
        animation: bounceHint 1.8s ease-in-out infinite;
      }
      @keyframes bounceHint {
        0%,
        100% {
          transform: translateY(0);
          opacity: 0.7;
        }
        50% {
          transform: translateY(6px);
          opacity: 1;
        }
      }

      /* ---------- Photo feed ---------- */
      .feed {
        display: flex;
        flex-direction: column;
        gap: 46px;
        margin-top: 10px;
      }

      .card {
        opacity: 0;
        transform: translateY(60px) scale(0.9) rotate(var(--tilt, 0deg));
        transition:
          opacity 0.8s cubic-bezier(0.2, 0.8, 0.2, 1),
          transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        background: #fff;
        padding: 14px 14px 20px;
        border-radius: 14px;
        box-shadow: 0 18px 40px -12px rgba(107, 15, 43, 0.28);
        position: relative;
      }
      .card.visible {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(var(--tilt, 0deg));
      }
      .card:nth-child(odd) {
        --tilt: -2.4deg;
      }
      .card:nth-child(even) {
        --tilt: 2.4deg;
      }

      .tape {
        position: absolute;
        top: -14px;
        width: 70px;
        height: 26px;
        background: rgba(242, 177, 92, 0.55);
        left: 50%;
        transform: translateX(-50%) rotate(-3deg);
        box-shadow: 0 3px 6px rgba(0, 0, 0, 0.12);
        border-radius: 2px;
      }

      .photo-frame {
        width: 100%;
        aspect-ratio: 9/16;
        border-radius: 8px;
        overflow: hidden;
        position: relative;
        background: var(--blush);
        perspective: 900px;
        cursor: pointer;
      }
      .photo-frame img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transform: scale(1.08);
        transition:
          transform 1.1s cubic-bezier(0.2, 0.8, 0.2, 1),
          filter 0.4s ease;
        filter: saturate(0.95);
        backface-visibility: hidden;
      }
      .card.visible .photo-frame img {
        transform: scale(1);
      }

      .tap-hint {
        position: absolute;
        left: 50%;
        bottom: 10px;
        transform: translateX(-50%);
        background: rgba(107, 15, 43, 0.55);
        color: #fff;
        font-size: 11px;
        padding: 5px 12px;
        border-radius: 999px;
        letter-spacing: 0.3px;
        pointer-events: none;
        animation: hintPulse 1.8s ease-in-out infinite;
        z-index: 3;
      }
      @keyframes hintPulse {
        0%,
        100% {
          opacity: 0.55;
        }
        50% {
          opacity: 1;
        }
      }

      .corner-heart {
        position: absolute;
        bottom: 10px;
        right: 10px;
        font-size: 22px;
        color: #fff;
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4));
        animation: littleBeat 1.6s ease-in-out infinite;
      }
      @keyframes littleBeat {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.22);
        }
      }

      .caption {
        font-family: "Dancing Script", cursive;
        font-size: 23px;
        color: var(--rose);
        text-align: center;
        margin: 14px 4px 2px;
      }
      .index-tag {
        text-align: center;
        font-size: 11px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--pink);
        opacity: 0.75;
      }

      /* burst hearts on reveal */
      .burst {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: visible;
      }
      .burst span {
        position: absolute;
        font-size: 14px;
        opacity: 0;
        top: 50%;
        left: 50%;
      }

      /* ---------- sentinel / loader ---------- */
      #sentinel {
        height: 1px;
      }
      .loader-row {
        text-align: center;
        padding: 20px 0 6px;
        font-size: 13px;
        color: var(--rose);
        opacity: 0.65;
      }
      .loader-heart {
        display: inline-block;
        animation: pulseBeat 1s ease-in-out infinite;
      }

      .footer-note {
        text-align: center;
        margin-top: 50px;
        font-family: "Dancing Script", cursive;
        font-size: 26px;
        color: var(--rose);
        opacity: 0.85;
      }

      /* ---------- Envelope + Letter ---------- */
      #letterSection {
        margin: 6px 0 34px;
        opacity: 0;
        transform: translateY(30px);
        transition:
          opacity 0.9s ease,
          transform 0.9s ease;
        pointer-events: none;
      }
      #letterSection.visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .envelope-wrap {
        text-align: center;
        padding: 10px 0 20px;
      }
      .envelope-wrap p.lead {
        font-size: 13px;
        color: var(--rose);
        opacity: 0.75;
        margin-bottom: 14px;
        letter-spacing: 0.3px;
      }
      .envelope {
        display: inline-block;
        font-size: 74px;
        cursor: pointer;
        animation: pulseBeat 2.2s ease-in-out infinite;
        filter: drop-shadow(0 10px 18px rgba(196, 24, 75, 0.35));
        transition:
          transform 0.3s ease,
          opacity 0.3s ease;
      }
      .envelope:active {
        transform: scale(0.9);
      }
      .envelope.opening {
        transform: scale(1.3) rotate(6deg);
        opacity: 0;
      }

      .password-gate {
        display: none;
        text-align: center;
        background: #fff;
        border-radius: 14px;
        padding: 26px 22px 24px;
        box-shadow: 0 18px 40px -14px rgba(107, 15, 43, 0.3);
        max-width: 320px;
        margin: 0 auto;
      }
      .password-gate.show {
        display: block;
        animation: gateIn 0.4s ease;
      }
      @keyframes gateIn {
        from {
          opacity: 0;
          transform: translateY(14px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .password-gate.shake {
        animation: gateShake 0.4s ease;
      }
      @keyframes gateShake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-8px);
        }
        75% {
          transform: translateX(8px);
        }
      }
      .gate-title {
        font-family: "Dancing Script", cursive;
        font-size: 24px;
        color: var(--rose);
        margin: 0 0 6px;
      }
      .gate-hint {
        font-size: 12px;
        color: var(--maroon);
        opacity: 0.6;
        margin: 0 0 16px;
        font-style: italic;
      }
      #passwordInput {
        width: 100%;
        padding: 11px 14px;
        border: 1.5px solid var(--blush);
        border-radius: 999px;
        font-size: 14px;
        text-align: center;
        outline: none;
        font-family: "Poppins", sans-serif;
        color: var(--maroon);
        background: var(--cream);
      }
      #passwordInput:focus {
        border-color: var(--pink);
      }
      #unlockBtn {
        display: block;
        width: 100%;
        margin-top: 12px;
        background: linear-gradient(135deg, var(--rose), var(--pink));
        color: #fff;
        border: none;
        padding: 11px 0;
        border-radius: 999px;
        font-size: 13px;
        letter-spacing: 0.4px;
        cursor: pointer;
        font-family: "Poppins", sans-serif;
        box-shadow: 0 8px 18px rgba(196, 24, 75, 0.3);
      }
      #unlockBtn:active {
        transform: scale(0.97);
      }
      .gate-error {
        display: none;
        color: var(--rose);
        font-size: 12px;
        margin: 12px 0 0;
      }
      .gate-error.show {
        display: block;
      }

      .letter-paper {
        display: none;
        background: #fffdf8;
        background-image: linear-gradient(var(--blush) 1px, transparent 1px);
        background-size: 100% 28px;
        border: 1px solid var(--blush);
        border-radius: 6px;
        padding: 30px 24px 26px;
        box-shadow: 0 20px 45px -14px rgba(107, 15, 43, 0.35);
        position: relative;
        opacity: 0;
        transform: translateY(20px) scale(0.96);
        transition:
          opacity 0.6s ease,
          transform 0.6s ease;
      }
      .letter-paper.show {
        display: block;
      }
      .letter-paper.reveal {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      .letter-paper::before {
        content: "Click to Open 💗";
        position: absolute;
        top: -18px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 26px;
        background: var(--cream);
        padding: 0 8px;
      }
      .letter-heading {
        font-family: "Dancing Script", cursive;
        font-size: 30px;
        color: var(--rose);
        text-align: center;
        margin: 0 0 14px;
      }
      .letter-body {
        font-size: 15px;
        line-height: 1.9;
        color: var(--maroon);
        white-space: pre-line;
        font-family: "Poppins", sans-serif;
      }
      .letter-signature {
        font-family: "Dancing Script", cursive;
        font-size: 24px;
        color: var(--rose);
        text-align: right;
        margin-top: 18px;
      }
      .letter-close {
        display: block;
        margin: 22px auto 0;
        background: var(--rose);
        color: #fff;
        border: none;
        padding: 9px 22px;
        border-radius: 999px;
        font-size: 12px;
        letter-spacing: 0.5px;
        cursor: pointer;
        font-family: "Poppins", sans-serif;
      }

      @media (max-width: 360px) {
        #heartbeatWrap {
          width: 26px;
          right: 4px;
        }
      }
      #mainGate {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background-color: #000; /* Change to any color or image */
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999; /* Keeps it above everything else */
      }
      /* Center the form */
      .form {
        width: 250px;
        padding: 20px;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);

        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      /* Password input */
      .form input {
        padding: 12px 15px;
        font-size: 16px;
        border: 2px solid #ddd;
        border-radius: 8px;
        outline: none;
        transition: 0.3s;
      }

      .form input:focus {
        border-color: #4caf50;
        box-shadow: 0 0 8px rgba(76, 175, 80, 0.3);
      }

      /* Button */
      .form button {
        padding: 12px;
        font-size: 16px;
        font-weight: bold;
        color: white;
        background: #4caf50;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
      }

      .form button:hover {
        background: #43a047;
        transform: translateY(-2px);
      }

      .form button:active {
        transform: scale(0.98);
      }
    </style>
  </head>

        />
        <button id="open">Open</button>
      </div>

      <div class="footer-note">— made with 💗 —</div>

          signature: "—Tumhara Niraj 💖",

          password: "niraj",

        },
      };
      /* ========================================================= */

      document.getElementById("heroTitle").textContent = CONFIG.heroTitle;
      document.getElementById("heroMsg").textContent = CONFIG.heroSubtitle;
      document.getElementById("heroRibbon").textContent = CONFIG.message;
      document.title = CONFIG.message + " 💗";

      /* ---------- Build tiled background text ---------- */
      (function buildBgText() {
        const layer = document.getElementById("bgTextLayer");
        const rows = 22;
        const unit = (CONFIG.message + "  💗  ").repeat(12);
        for (let i = 0; i < rows; i++) {
          const row = document.createElement("div");
          row.className = "bg-row";
          row.style.fontSize = 16 + (i % 4) * 6 + "px";
          row.textContent = unit;
          const duration = 40 + (i % 5) * 12;
          const dir = i % 2 === 0 ? 1 : -1;
          row.style.transform = `translateX(0)`;
          row.animate(
            [
              { transform: `translateX(0)` },
              { transform: `translateX(${dir * -50}%)` },
            ],
            {
              duration: duration * 1000,
              iterations: Infinity,
              easing: "linear",
            },
          );
          layer.appendChild(row);
        }
      })();

      /* ---------- Ambient floating hearts ---------- */
      (function ambientHearts() {
        const layer = document.getElementById("heartLayer");
        const emojis = ["💗", "💕", "❤️", "💖", "💓"];
        function spawn() {
          const h = document.createElement("span");
          h.className = "float-heart";
          h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          const left = Math.random() * 100;
          const size = 14 + Math.random() * 20;
          const duration = 7 + Math.random() * 6;
          const drift = Math.random() * 80 - 40 + "px";
          h.style.left = left + "vw";
          h.style.fontSize = size + "px";
          h.style.setProperty("--drift", drift);
          h.style.animationDuration = duration + "s";
          layer.appendChild(h);
          setTimeout(() => h.remove(), duration * 1000 + 200);
        }
        setInterval(spawn, 650);
        for (let i = 0; i < 5; i++) setTimeout(spawn, i * 300);
      })();

      /* ---------- Heartbeat scroll progress ---------- */
      const hbFill = document.getElementById("hbFill");
      const hbHeart = document.getElementById("hbHeart");
      const hbWrap = document.getElementById("heartbeatWrap");
      const HB_LEN = 2000;
      function updateHeartbeat() {
        const scrollTop = window.scrollY;
        const max = document.body.scrollHeight - window.innerHeight;
        const pct = max > 0 ? Math.min(1, scrollTop / max) : 0;
        hbFill.style.strokeDashoffset = HB_LEN - HB_LEN * pct;
        const rect = hbWrap.getBoundingClientRect();
        hbHeart.style.top = pct * rect.height + "px";
        hbHeart.style.left = "50%";
      }
      window.addEventListener("scroll", updateHeartbeat, { passive: true });
      updateHeartbeat();

      /* ---------- Feed: infinite scroll ---------- */
      const feed = document.getElementById("feed");
      const BATCH = 5;
      let loadedCount = 0;
      const MAX_CARDS = Infinity; // true infinite scroll — photos loop through CONFIG.images forever

      const burstEmojis = ["💗", "💕", "✨", "💖"];

      function makeCard(item, idx) {
        const card = document.createElement("div");
        card.className = "card";

        const tape = document.createElement("div");
        tape.className = "tape";
        card.appendChild(tape);

        const frame = document.createElement("div");
        frame.className = "photo-frame";
        frame.dataset.pointer = idx % CONFIG.images.length;

        const img = document.createElement("img");
        img.src = item.src;
        img.loading = "lazy";
        img.alt = item.caption;
        frame.appendChild(img);

        if (idx === 0) {
          const hint = document.createElement("div");
          hint.className = "tap-hint";
          hint.textContent = "tap the photo ✨";
          hint.id = "tapHintFirst";
          frame.appendChild(hint);
        }

        frame.addEventListener("click", () => flipToNext(frame, card));

        const heart = document.createElement("div");
        heart.className = "corner-heart";
        heart.textContent = "💗";
        frame.appendChild(heart);

        const burst = document.createElement("div");
        burst.className = "burst";
        for (let i = 0; i < 6; i++) {
          const s = document.createElement("span");
          s.textContent = burstEmojis[i % burstEmojis.length];
          burst.appendChild(s);
        }
        frame.appendChild(burst);

        card.appendChild(frame);

        const cap = document.createElement("div");
        cap.className = "caption";
        cap.textContent = item.caption;
        card.appendChild(cap);

        const tag = document.createElement("div");
        tag.className = "index-tag";
        tag.textContent = "memory " + String(idx + 1).padStart(3, "0");
        card.appendChild(tag);

        return card;
      }

      function flipToNext(frame, card) {
        const img = frame.querySelector("img");
        const capEl = card.querySelector(".caption");
        const hint = frame.querySelector("#tapHintFirst");
        if (hint) hint.remove();

        const next =
          (parseInt(frame.dataset.pointer, 10) + 1) % CONFIG.images.length;
        frame.dataset.pointer = next;

        const goAway = img.animate(
          [
            { transform: "scale(1) rotateY(0deg)" },
            { transform: "scale(.92) rotateY(90deg)" },
          ],
          { duration: 260, easing: "ease-in", fill: "forwards" },
        );
        goAway.onfinish = () => {
          const nextItem = CONFIG.images[next];
          img.src = nextItem.src;
          img.alt = nextItem.caption;
          if (capEl) capEl.textContent = nextItem.caption;
          img.animate(
            [
              { transform: "scale(.92) rotateY(-90deg)" },
              { transform: "scale(1) rotateY(0deg)" },
            ],
            { duration: 320, easing: "ease-out", fill: "forwards" },
          );
          triggerBurst(card);
        };
      }

      function triggerBurst(card) {
        const spans = card.querySelectorAll(".burst span");
        spans.forEach((s, i) => {
          const angle = (i / spans.length) * Math.PI * 2;
          const dist = 40 + Math.random() * 20;
          const x = Math.cos(angle) * dist;
          const y = Math.sin(angle) * dist;
          s.animate(
            [
              { transform: "translate(-50%,-50%) scale(.4)", opacity: 0 },
              {
                transform: `translate(${x - 50}%,${y - 50}%) scale(1.1)`,
                opacity: 1,
                offset: 0.4,
              },
              {
                transform: `translate(${x * 1.6 - 50}%,${y * 1.6 - 50}%) scale(.6)`,
                opacity: 0,
              },
            ],
            { duration: 900, easing: "ease-out" },
          );
        });
      }

      const revealObserver = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("visible");
              triggerBurst(entry.target);
              revealObserver.unobserve(entry.target);
            }
          });
        },
        { threshold: 0.25, rootMargin: "0px 0px -40px 0px" },
      );

      function loadMore() {
        for (let i = 0; i < BATCH; i++) {
          const item = CONFIG.images[loadedCount % CONFIG.images.length];
          const card = makeCard(item, loadedCount);
          feed.appendChild(card);
          revealObserver.observe(card);
          loadedCount++;
        }
      }

      function checkScrollLoad() {
        const distanceToBottom =
          document.body.offsetHeight - (window.scrollY + window.innerHeight);
        if (distanceToBottom < 900) {
          loadMore();
        }
      }
      window.addEventListener("scroll", checkScrollLoad, { passive: true });
      window.addEventListener("resize", checkScrollLoad);

      // initial load, then keep filling until the page is tall enough to scroll
      loadMore();
      loadMore();
      let safety = 0;
      while (
        document.body.offsetHeight < window.innerHeight + 900 &&
        safety < 100
      ) {
        loadMore();
        safety++;
      }

      /* ---------- Envelope + Letter: reveal 5 seconds after the page opens ---------- */
      setTimeout(() => {
        document.getElementById("letterSection").classList.add("visible");
      }, 5000);

      document.getElementById("letterHeading").textContent =
        CONFIG.letter.heading;
      document.getElementById("letterBody").textContent = CONFIG.letter.body;
      document.getElementById("letterSignature").textContent =
        CONFIG.letter.signature;

      const envelope = document.getElementById("envelope");
      const envelopeLead = document.getElementById("envelopeLead");
      const passwordGate = document.getElementById("passwordGate");
      const gateHint = document.getElementById("gateHint");
      const passwordInput = document.getElementById("passwordInput");
      const unlockBtn = document.getElementById("unlockBtn");
      const gateError = document.getElementById("gateError");
      const letterPaper = document.getElementById("letterPaper");
      const letterClose = document.getElementById("letterClose");

      gateHint.textContent = CONFIG.letter.passwordHint || "";
      gateHint.style.display = CONFIG.letter.passwordHint ? "block" : "none";

      envelope.addEventListener("click", () => {
        envelope.classList.add("opening");
        envelopeLead.style.opacity = "0";
        setTimeout(() => {
          envelope.style.display = "none";
          envelopeLead.style.display = "none";
          passwordGate.classList.add("show");
          passwordInput.focus();
        }, 320);
      });

      function tryUnlock() {
        const guess = passwordInput.value.trim().toLowerCase();
        const answer = String(CONFIG.letter.password || "")
          .trim()
          .toLowerCase();
        if (guess.length > 0 && guess === answer) {
          passwordGate.classList.remove("show");
          letterPaper.classList.add("show");
          requestAnimationFrame(() => letterPaper.classList.add("reveal"));
        } else {
          gateError.classList.add("show");
          passwordGate.classList.remove("shake");
          void passwordGate.offsetWidth; // restart animation
          passwordGate.classList.add("shake");
          passwordInput.value = "";
          passwordInput.focus();
        }
      }

      unlockBtn.addEventListener("click", tryUnlock);
      passwordInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") tryUnlock();
      });

      letterClose.addEventListener("click", () => {
        letterPaper.classList.remove("reveal");
        setTimeout(() => {
          letterPaper.classList.remove("show");
          envelope.style.display = "inline-block";
          envelope.classList.remove("opening");
          envelopeLead.style.display = "block";
          gateError.classList.remove("show");
          requestAnimationFrame(() => (envelopeLead.style.opacity = ".75"));
        }, 400);
      });
    </script>
  </body>
</html>
